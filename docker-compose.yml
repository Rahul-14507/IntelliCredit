version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: intellicredit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/intellicredit
    env_file: .env
    depends_on: [postgres]
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on: [backend]
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
